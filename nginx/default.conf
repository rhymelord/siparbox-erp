# ──────────────────────────────────────────────────────────────
# nginx/default.conf — siparbox.com için Reverse Proxy
# HTTP → HTTPS yönlendirmesi + SSL desteği
# ──────────────────────────────────────────────────────────────

upstream backend {
    server backend:8888;
}

upstream frontend {
    server frontend:80;
}

# ── HTTP → HTTPS Yönlendirme ─────────────────────────────────
server {
    listen 80;
    server_name siparbox.com www.siparbox.com;

    # Let's Encrypt doğrulama için (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Her şeyi HTTPS'e yönlendir
    location / {
        return 301 https://siparbox.com$request_uri;
    }
}

# ── HTTPS Ana Sunucu ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name siparbox.com www.siparbox.com;

    client_max_body_size 20M;

    # SSL Sertifikaları (Certbot ile oluşturulacak)
    ssl_certificate     /etc/letsencrypt/live/siparbox.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siparbox.com/privkey.pem;

    # SSL Güvenlik Ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # ── Backend API ──────────────────────────────────────────
    location /api {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # ── Upload edilen dosyalar (backend public klasörü) ───────
    location /public {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Frontend (React uygulaması) ───────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
